
# HTTP server: redirect all to HTTPS, except ACME challenge
server {
    listen 80;
    server_name sigmrbyte.com www.sigmrbyte.com;

    # Allow Certbot challenge over HTTP
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/sigmrbyte-webapp/frontend/dist;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server: serve site for both domains
server {
    listen 443 ssl;
    server_name sigmrbyte.com www.sigmrbyte.com;

    root /var/www/sigmrbyte-webapp/frontend/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/sigmrbyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sigmrbyte.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API requests to backend
    # location /api/ {
    #     proxy_pass http://localhost:5000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
